# keywords.yaml — Static physics vocabulary for the MCP pipeline
# Maps natural language phrases to registry keys and parameter values.
# Data only — no code. The CS collaborator's indexer.py merges this with
# registry data at runtime to build the full search index.

task_routing:
  # Maps user intent phrases to candidate algorithms.
  # Each phrase resolves to a task key in algorithms.json → algorithm_selection_guide.tasks
  ground_state:
    phrases:
      - "ground state"
      - "lowest energy"
      - "ground state energy"
      - "find the ground state"
      - "energy minimization"
      - "variational"
    task_key: "ground_state"

  time_evolution:
    phrases:
      - "time evolution"
      - "dynamics"
      - "real time"
      - "quench"
      - "propagate"
      - "time dependent"
      - "quantum dynamics"
      - "time evolve"
      - "unitary evolution"
    task_key: "time_evolution"

  spectrum:
    phrases:
      - "spectrum"
      - "eigenvalues"
      - "eigenstates"
      - "energy levels"
      - "energy spectrum"
      - "diagonalize"
      - "excited states"
      - "full spectrum"
    task_key: "spectrum"

  imaginary_time:
    phrases:
      - "imaginary time"
      - "imaginary time evolution"
      - "cooling"
      - "thermal ground state"
    task_key: "imaginary_time"

system_detection:
  # Maps user language to system type (spin or spinboson).
  # Key = system_types[key].config_value in systems.json
