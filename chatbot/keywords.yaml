# ── Physics vocabulary ────────────────────────────────────────────────────────
# Maps physical descriptions to parameter values.
physics_vocabulary:
  ferromagnetic: "J < 0"
  antiferromagnetic: "J > 0"
  dipolar: "alpha = 3"
  coulomb: "alpha = 1"
  nearest_neighbor_limit: "alpha → ∞"
  all_to_all: "alpha = 0"
  critical_ising: "|J/h| = 1 for TFIM with Z coupling and X field"

# ── Operator vocabulary ───────────────────────────────────────────────────────
# Maps physical quantity names to spin operator symbols.
operator_vocabulary:
  magnetization: "Z"
  transverse_magnetization: "X"
  raising: "Sp"
  lowering: "Sm"

